<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牡丹花 - 国色天香</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 50%, #fbcfe8 100%);
            min-height: 100vh;
            color: #4a1942;
        }

        /* 装饰花瓣 */
        .floating-petals {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .petal {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #f9a8d4 0%, #ec4899 100%);
            border-radius: 50% 0 50% 50%;
            opacity: 0.3;
            animation: fall 15s infinite linear;
        }

        .petal:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .petal:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
        .petal:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 10s; }
        .petal:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 16s; }
        .petal:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 11s; }
        .petal:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 13s; }
        .petal:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 15s; }
        .petal:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 12s; }
        .petal:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 14s; }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* 头部 */
        header {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, rgba(190, 24, 93, 0.9) 0%, rgba(157, 23, 77, 0.95) 100%);
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(190, 24, 93, 0.3);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .logo span {
            color: #fbbf24;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 英雄区域 */
        .hero {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #be185d 0%, #9d174d 50%, #831843 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: none;
        }

        .hero p {
            font-size: 1.3rem;
            color: #9d174d;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        /* 牡丹花 SVG */
        .peony-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .peony {
            width: 300px;
            height: 300px;
            animation: bloom 3s ease-in-out infinite;
        }

        @keyframes bloom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 特色区域 */
        .features {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #831843;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #f472b6, #ec4899, #db2777);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(190, 24, 93, 0.15);
            transition: all 0.4s ease;
            border: 2px solid transparent;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: #f472b6;
            box-shadow: 0 20px 60px rgba(190, 24, 93, 0.25);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #fbcfe8 0%, #f9a8d4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            color: #9d174d;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #6b7280;
            line-height: 1.6;
        }

        /* 品种展示 */
        .varieties {
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.5) 100%);
            padding: 80px 20px;
        }

        .varieties-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .variety-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .variety-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(190, 24, 93, 0.12);
            transition: all 0.4s ease;
        }

        .variety-card:hover {
            transform: scale(1.03);
            box-shadow: 0 25px 70px rgba(190, 24, 93, 0.2);
        }

        .variety-image {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .variety-image.pink {
            background: linear-gradient(135deg, #fdf2f8 0%, #fbcfe8 50%, #f9a8d4 100%);
        }

        .variety-image.red {
            background: linear-gradient(135deg, #fef2f2 0%, #fecaca 50%, #f87171 100%);
        }

        .variety-image.white {
            background: linear-gradient(135deg, #fefefe 0%, #f3f4f6 50%, #e5e7eb 100%);
        }

        .variety-image.purple {
            background: linear-gradient(135deg, #faf5ff 0%, #e9d5ff 50%, #c084fc 100%);
        }

        .variety-image.yellow {
            background: linear-gradient(135deg, #fefce8 0%, #fef08a 50%, #facc15 100%);
        }

        .variety-image.mix {
            background: linear-gradient(135deg, #fdf2f8 0%, #ddd6fe 50%, #fbcfe8 100%);
        }

        .variety-content {
            padding: 25px;
        }

        .variety-name {
            font-size: 1.4rem;
            color: #831843;
            margin-bottom: 10px;
        }

        .variety-desc {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .variety-tag {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            color: #be185d;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 文化寓意 */
        .culture {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .culture-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .culture-text h2 {
            font-size: 2.2rem;
            color: #831843;
            margin-bottom: 25px;
        }

        .culture-text p {
            color: #4a5568;
            line-height: 2;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .culture-list {
            list-style: none;
        }

        .culture-list li {
            padding: 12px 0;
            border-bottom: 1px solid #fce7f3;
            color: #9d174d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .culture-list li::before {
            content: '✿';
            color: #ec4899;
        }

        .culture-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 诗词区域 */
        .poetry {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, rgba(190, 24, 93, 0.05) 0%, rgba(236, 72, 153, 0.1) 100%);
            padding: 80px 20px;
        }

        .poetry-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .poetry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .poetry-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(190, 24, 93, 0.1);
            border-left: 4px solid #ec4899;
            transition: all 0.3s ease;
        }

        .poetry-card:hover {
            transform: translateX(10px);
        }

        .poetry-content {
            font-size: 1.2rem;
            color: #4a1942;
            line-height: 2;
            margin-bottom: 20px;
            font-style: italic;
        }

        .poetry-author {
            color: #9d174d;
            font-size: 0.95rem;
            text-align: right;
        }

        /* 养护指南 */
        .care-guide {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .care-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .care-item {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(190, 24, 93, 0.1);
            transition: all 0.3s ease;
        }

        .care-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(190, 24, 93, 0.15);
        }

        .care-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .care-item h4 {
            color: #9d174d;
            font-size: 1.2rem;
            margin-bottom: 10
