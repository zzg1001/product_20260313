<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醇香酒庄 - 品味生活的艺术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1f1f 50%, #1a0a0a 100%);
            min-height: 100vh;
            color: #f5f5f5;
        }

        /* 导航栏 */
        header {
            background: linear-gradient(90deg, rgba(139, 69, 19, 0.95) 0%, rgba(101, 67, 33, 0.95) 100%);
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700 0%, #daa520 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(218, 165, 32, 0.3);
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a:hover {
            color: #ffd700;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #daa520);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-btn {
            background: linear-gradient(135deg, #8b0000 0%, #a52a2a 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
            position: relative;
        }

        .cart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.6);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ffd700;
            color: #1a0a0a;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 英雄区域 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(26, 10, 10, 0.9) 0%, rgba(45, 31, 31, 0.8) 100%),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="%23ffffff10"/><circle cx="75" cy="75" r="1" fill="%23ffffff08"/><circle cx="50" cy="10" r="0.5" fill="%23ffffff05"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 69, 19, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 72px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd700 0%, #daa520 30%, #f5f5f5 60%, #daa520 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(218, 165, 32, 0.5);
            letter-spacing: 8px;
        }

        .hero p {
            font-size: 22px;
            color: #ccc;
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .hero-btn {
            background: linear-gradient(135deg, #8b0000 0%, #a52a2a 50%, #8b4513 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(139, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .hero-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(139, 0, 0, 0.7);
        }

        /* 分类区域 */
        .categories {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 42px;
            color: #ffd700;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8b0000, #ffd700, #8b0000, transparent);
        }

        .section-title p {
            color: #999;
            font-size: 16px;
            margin-top: 20px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .category-card {
            background: linear-gradient(145deg, rgba(45, 31, 31, 0.9) 0%, rgba(26, 10, 10, 0.95) 100%);
            border-radius: 20px;
            padding: 40px 25px;
            text-align: center;
            transition: all 0.4s ease;
            border: 1px solid rgba(139, 69, 19, 0.3);
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(139, 0, 0, 0.3);
            border-color: rgba(218, 165, 32, 0.5);
        }

        .category-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .category-card h3 {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .category-card p {
            color: #999;
            font-size: 14px;
        }

        /* 精选商品 */
        .products {
            padding: 100px 5%;
            background: linear-gradient(180deg, rgba(45, 31, 31, 0.5) 0%, rgba(26, 10, 10, 0.8) 100%);
        }

        .products-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .product-card {
            background: linear-gradient(145deg, #2d1f1f 0%, #1a0a0a 100%);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(139, 69, 19, 0.2);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border-color: rgba(218, 165, 32, 0.4);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #8b0000 0%, #a52a2a 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-image {
            height: 280px;
            background: linear-gradient(135deg, #3d2b2b 0%, #2a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(139, 69, 19, 0.2) 0%, transparent 70%);
        }

        .product-info {
            padding: 25px;
        }

        .product-info h3 {
            font-size: 18px;
            color: #f5f5f5;
            margin-bottom: 8px;
        }

        .product-info .origin {
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .product-info .price {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-info .price span {
            font-size: 14px;
            color: #666;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .add-cart-btn {
            width: 100%;
            background: linear-gradient(135deg, #8b0000 0%, #a52a2a 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .add-cart-btn:hover {
            background: linear-gradient(135deg, #a52a2a 0%, #8b4513 100%);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.4);
        }

        /* 特色区域 */
        .features {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .feature-card {
            text-align: center;
            padding: 50px 30px;
            background: linear-gradient(145deg, rgba(45, 31, 31, 0.6) 0%, rgba(26, 10, 10, 0.8) 100%);
            border-radius: 20px;
            border: 1px solid rgba(139, 69, 19, 0.2);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            border-color: rgba(218, 165, 32, 0.4);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 60px;
            margin-bottom: 25px;
        }

        .feature-card h3 {
            font-size: 22px;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #999;
            line-height: 1.8;
        }

        /* 品酒知识 */
        .knowledge {
            padding: 100px 5%;
            background: linear-gradient(180deg, rgba(45, 31, 31, 0.5) 0%, rgba(26, 10, 10, 0.8) 100%);
        }

        .knowledge-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr
