<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW 宝马汽车 - 驾驭激情，尽享豪华</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c1929 0%, #1a2a3a 50%, #0d1f2d 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(12, 25, 41, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }

        .logo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(#0066b1 0deg 90deg, #ffffff 90deg 180deg, #0066b1 180deg 270deg, #ffffff 270deg 360deg);
            border: 3px solid #ffffff;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            box-shadow: 0 4px 15px rgba(0, 102, 177, 0.4);
        }

        /* 英雄区域 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 5%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810"><rect fill="%230c1929" width="1440" height="810"/><path fill="%23162436" d="M0 500 Q360 450 720 500 T1440 480 V810 H0Z"/></svg>');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-size: 72px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #00a0e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .hero-content p {
            font-size: 24px;
            color: #b0c4de;
            margin-bottom: 40px;
        }

        .hero-btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 102, 177, 0.4);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 102, 177, 0.6);
        }

        /* 车型展示区域 */
        .section {
            padding: 100px 5%;
        }

        .section-title {
            text-align: center;
            font-size: 42px;
            margin-bottom: 60px;
            color: #ffffff;
        }

        .section-title span {
            color: #00a0e9;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .car-card {
            background: linear-gradient(145deg, #1a2a3a, #0f1c28);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .car-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 102, 177, 0.3);
            border-color: rgba(0, 160, 233, 0.3);
        }

        .car-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #2a3a4a, #1a2a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .car-image::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 80px;
            background: linear-gradient(135deg, #3a4a5a, #4a5a6a);
            border-radius: 20px 20px 5px 5px;
        }

        .car-image::after {
            content: '';
            position: absolute;
            width: 160px;
            height: 50px;
            background: linear-gradient(135deg, #2a3a4a, #3a4a5a);
            border-radius: 10px;
            top: 50%;
            transform: translateY(-80%);
        }

        .car-svg {
            width: 280px;
            height: 120px;
        }

        .car-info {
            padding: 30px;
        }

        .car-info h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .car-info .series {
            color: #00a0e9;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .car-info p {
            color: #8899aa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .car-specs {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .spec {
            text-align: center;
        }

        .spec-value {
            font-size: 20px;
            font-weight: bold;
            color: #00a0e9;
        }

        .spec-label {
            font-size: 12px;
            color: #8899aa;
        }

        .car-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }

        .price span {
            font-size: 14px;
            color: #8899aa;
        }

        .btn-detail {
            padding: 12px 30px;
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            color: #ffffff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-detail:hover {
            box-shadow: 0 5px 20px rgba(0, 102, 177, 0.5);
            transform: scale(1.05);
        }

        /* 特色区域 */
        .features {
            background: linear-gradient(180deg, rgba(0, 102, 177, 0.1), transparent);
            padding: 100px 5%;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            text-align: center;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(0, 102, 177, 0.1);
            border-color: rgba(0, 160, 233, 0.3);
            transform: translateY(-5px);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .feature-card h4 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .feature-card p {
            color: #8899aa;
            line-height: 1.6;
        }

        /* 预约试驾 */
        .booking {
            padding: 100px 5%;
            background: linear-gradient(135deg, rgba(0, 102, 177, 0.2), rgba(0, 160, 233, 0.1));
        }

        .booking-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .booking-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #8899aa;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00a0e9;
            box-shadow: 0 0 20px rgba(0, 160, 233, 0.2);
        }

        .form-group select option {
            background: #1a2a3a;
            color: #ffffff;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 18px;
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 10px 30px rgba(0, 102, 177, 0.5);
            transform: translateY(-2px);
        }

        /* 页脚 */
        footer {
            background: #0a1520;
            padding: 60px 5% 30px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-section h5 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section ul li a {
            color: #8899aa;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section ul li a:hover {
            color: #00a0e9;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 40px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #8899aa;
        }

        /* 购物车图标 */
        .cart-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #0066b1, #00a0e9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 102, 177, 0.5);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-icon svg {
            width: 28px;
            height: 28px;
            fill: #ffffff;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 24px;
