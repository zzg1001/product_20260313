<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析可视化报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .update-time {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .stat-card.blue { border-left: 4px solid #667eea; }
        .stat-card.green { border-left: 4px solid #48bb78; }
        .stat-card.orange { border-left: 4px solid #ed8936; }
        .stat-card.pink { border-left: 4px solid #ed64a6; }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .stat-card.blue .stat-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card.green .stat-icon { background: linear-gradient(135deg, #48bb78, #38a169); }
        .stat-card.orange .stat-icon { background: linear-gradient(135deg, #ed8936, #dd6b20); }
        .stat-card.pink .stat-icon { background: linear-gradient(135deg, #ed64a6, #d53f8c); }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .stat-change.up {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .stat-change.down {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }

        /* 图表区域 */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .chart-btn:hover, .chart-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            color: #fff;
        }

        /* 柱状图 */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 250px;
            padding: 20px 10px;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 60px;
        }

        .bar {
            width: 40px;
            border-radius: 8px 8px 0 0;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            transition: height 1s ease;
            position: relative;
        }

        .bar:hover {
            filter: brightness(1.2);
        }

        .bar-value {
            position: absolute;
            top: -25px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .bar-label {
            margin-top: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 折线图 */
        .line-chart {
            position: relative;
            height: 250px;
            padding: 20px;
        }

        .line-chart svg {
            width: 100%;
            height: 100%;
        }

        .chart-line {
            fill: none;
            stroke: url(#lineGradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chart-area {
            fill: url(#areaGradient);
        }

        .chart-dot {
            fill: #667eea;
            stroke: #fff;
            stroke-width: 2;
            cursor: pointer;
            transition: r 0.3s ease;
        }

        .chart-dot:hover {
            r: 8;
        }

        .line-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            margin-top: 10px;
        }

        .line-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 饼图 */
        .pie-chart-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .pie-chart {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(
                #667eea 0deg 108deg,
                #48bb78 108deg 180deg,
                #ed8936 180deg 252deg,
                #ed64a6 252deg 324deg,
                #9f7aea 324deg 360deg
            );
            position: relative;
        }

        .pie-chart::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: #1a1a2e;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .pie-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }

        .pie-center-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .pie-center-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .legend-value {
            margin-left: auto;
            font-weight: 600;
        }

        /* 数据表格 */
        .table-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
            width: 200px;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
        }

        .data-table th {
            background: rgba(102, 126, 234, 0.2);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .data-table th:first-child {
            border-radius: 10px 0 0 10px;
        }

        .data-table th:last-child {
            border-radius: 0 10px 10px 0;
        }

        .data-table tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .data-table td {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-badge.success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }

        .status-badge.warning {
            background: rgba(237, 137, 54, 0.2);
            color: #ed8936;
        }

        .status-badge.danger {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }

        .progress-bar {
            width: 100px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
