<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花语轻语 - 精品花卉商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 50%, #ffd6e0 100%);
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* 导航栏 */
        header {
            background: linear-gradient(90deg, #ff6b9d 0%, #ff8fab 50%, #ffa5c3 100%);
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 32px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .cart-btn {
            background: white;
            color: #ff6b9d;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4777;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 英雄区域 */
        .hero {
            margin-top: 80px;
            padding: 100px 5%;
            text-align: center;
            background: linear-gradient(180deg, rgba(255, 182, 203, 0.3) 0%, transparent 100%);
        }

        .hero h1 {
            font-size: 56px;
            color: #e84a7f;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(232, 74, 127, 0.2);
        }

        .hero p {
            font-size: 20px;
            color: #7a5a65;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        .hero-btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
            padding: 18px 45px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.5);
        }

        /* 分类区域 */
        .categories {
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            color: #e84a7f;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #ff6b9d, #ffa5c3);
            border-radius: 2px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .category-card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 182, 203, 0.2);
            cursor: pointer;
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 182, 203, 0.3);
        }

        .category-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .category-card h3 {
            color: #e84a7f;
            font-size: 18px;
        }

        /* 商品展示 */
        .products {
            padding: 60px 5%;
            background: linear-gradient(180deg, transparent 0%, rgba(255, 214, 224, 0.5) 100%);
        }

        .products-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 182, 203, 0.2);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(255, 182, 203, 0.3);
        }

        .product-image {
            height: 250px;
            background: linear-gradient(135deg, #ffebf0 0%, #ffd6e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            overflow: hidden;
        }

        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(45deg, #ff4777, #ff6b9d);
            color: white;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .product-info {
            padding: 25px;
        }

        .product-name {
            font-size: 20px;
            color: #4a4a4a;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 24px;
            color: #e84a7f;
            font-weight: bold;
        }

        .product-price span {
            font-size: 14px;
            color: #aaa;
            text-decoration: line-through;
            margin-left: 8px;
        }

        .add-cart-btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8fab);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .add-cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.4);
        }

        /* 特色服务 */
        .features {
            padding: 80px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .feature-card {
            text-align: center;
            padding: 40px 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 203, 0.15);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 45px;
            margin-bottom: 20px;
        }

        .feature-card h3 {
            color: #e84a7f;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .feature-card p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 底部 */
        footer {
            background: linear-gradient(90deg, #ff6b9d 0%, #ff8fab 50%, #ffa5c3 100%);
            color: white;
            padding: 60px 5% 30px;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
        }

        .footer-brand h3 {
            font-size: 28px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-brand p {
            line-height: 1.8;
            opacity: 0.9;
        }

        .footer-links h4 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 12px;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        .footer-links a:hover {
            opacity: 1;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 40px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 浮动购物车 */
        .floating-cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(45deg, #ff4777, #ff6b9d);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 30px rgba(255, 71, 119, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .floating-cart:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(255, 71, 119, 0.5);
        }

        .floating-cart .count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: #ff4777;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .footer-content {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 16px;
            }

            .section-title {
                font-size: 28px;
            }

            .category-grid {
                grid-template-columns: repeat(2
