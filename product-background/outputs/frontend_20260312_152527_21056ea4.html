<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色玫瑰花艺馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe6e6 50%, #ffd6d6 100%);
            min-height: 100vh;
            color: #333;
        }

        /* 装饰性花瓣动画 */
        .petal {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(ellipse at center, #ff4757 0%, #c0392b 100%);
            border-radius: 50% 0 50% 50%;
            opacity: 0.6;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .petal:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; }
        .petal:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 1s; }
        .petal:nth-child(3) { left: 30%; animation-duration: 9s; animation-delay: 2s; }
        .petal:nth-child(4) { left: 40%; animation-duration: 11s; animation-delay: 0.5s; }
        .petal:nth-child(5) { left: 50%; animation-duration: 8s; animation-delay: 1.5s; }
        .petal:nth-child(6) { left: 60%; animation-duration: 10s; animation-delay: 2.5s; }
        .petal:nth-child(7) { left: 70%; animation-duration: 9s; animation-delay: 0.8s; }
        .petal:nth-child(8) { left: 80%; animation-duration: 12s; animation-delay: 1.8s; }
        .petal:nth-child(9) { left: 90%; animation-duration: 7s; animation-delay: 3s; }

        /* 头部导航 */
        header {
            background: linear-gradient(90deg, #c0392b 0%, #e74c3c 50%, #ff6b6b 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(192, 57, 43, 0.3);
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            position: relative;
        }

        /* CSS 绘制玫瑰花 */
        .rose {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .rose-petal {
            position: absolute;
            width: 20px;
            height: 30px;
            background: linear-gradient(135deg, #ff4757, #c0392b);
            border-radius: 50% 50% 50% 50%;
            transform-origin: bottom center;
        }

        .rose-petal:nth-child(1) { transform: rotate(0deg) translateY(-10px); }
        .rose-petal:nth-child(2) { transform: rotate(45deg) translateY(-10px); }
        .rose-petal:nth-child(3) { transform: rotate(90deg) translateY(-10px); }
        .rose-petal:nth-child(4) { transform: rotate(135deg) translateY(-10px); }
        .rose-petal:nth-child(5) { transform: rotate(180deg) translateY(-10px); }
        .rose-petal:nth-child(6) { transform: rotate(225deg) translateY(-10px); }
        .rose-petal:nth-child(7) { transform: rotate(270deg) translateY(-10px); }
        .rose-petal:nth-child(8) { transform: rotate(315deg) translateY(-10px); }

        .rose-center {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #ff6b6b, #c0392b);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .cart-btn {
            background: white;
            color: #c0392b;
            padding: 10px 25px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
        }

        .cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,255,255,0.4);
        }

        .cart-count {
            background: #c0392b;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        /* 主横幅 */
        .hero {
            text-align: center;
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }

        .hero h2 {
            font-size: 3.5rem;
            color: #c0392b;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 2px 2px 10px rgba(192, 57, 43, 0.2);
        }

        .hero p {
            font-size: 1.3rem;
            color: #666;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        .hero-btn {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(192, 57, 43, 0.4);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(192, 57, 43, 0.5);
        }

        /* 大型装饰花朵 */
        .flower-display {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .big-flower {
            width: 150px;
            height: 150px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .big-flower:nth-child(2) { animation-delay: 0.5s; }
        .big-flower:nth-child(3) { animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .flower-petals {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .flower-petals span {
            position: absolute;
            width: 60px;
            height: 80px;
            background: linear-gradient(135deg, #ff4757 0%, #c0392b 50%, #a33025 100%);
            border-radius: 50% 50% 50% 50%;
            top: 50%;
            left: 50%;
            transform-origin: center bottom;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 
                        inset 5px 5px 15px rgba(255,255,255,0.2);
        }

        .flower-petals span:nth-child(1) { transform: translate(-50%, -100%) rotate(0deg); }
        .flower-petals span:nth-child(2) { transform: translate(-50%, -100%) rotate(36deg); }
        .flower-petals span:nth-child(3) { transform: translate(-50%, -100%) rotate(72deg); }
        .flower-petals span:nth-child(4) { transform: translate(-50%, -100%) rotate(108deg); }
        .flower-petals span:nth-child(5) { transform: translate(-50%, -100%) rotate(144deg); }
        .flower-petals span:nth-child(6) { transform: translate(-50%, -100%) rotate(180deg); }
        .flower-petals span:nth-child(7) { transform: translate(-50%, -100%) rotate(216deg); }
        .flower-petals span:nth-child(8) { transform: translate(-50%, -100%) rotate(252deg); }
        .flower-petals span:nth-child(9) { transform: translate(-50%, -100%) rotate(288deg); }
        .flower-petals span:nth-child(10) { transform: translate(-50%, -100%) rotate(324deg); }

        .flower-center {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ffd700 0%, #ffb700 50%, #e6a100 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        /* 商品展示区 */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #c0392b;
            margin: 60px 0 40px;
            font-weight: 300;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c0392b, transparent);
            margin: 15px auto;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(192, 57, 43, 0.15);
            transition: all 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(192, 57, 43, 0.25);
        }

        .product-image {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-card:nth-child(1) .product-image { background: linear-gradient(135deg, #ffe4e4, #ffcece); }
        .product-card:nth-child(2) .product-image { background: linear-gradient(135deg, #ffe8e0, #ffd4c4); }
        .product-card:nth-child(3) .product-image { background: linear-gradient(135deg, #ffe0e8, #ffc4d4); }
        .product-card:nth-child(4) .product-image { background: linear-gradient(135deg, #f8e0e0, #f0c8c8); }
        .product-card:nth-child(5) .product-image { background: linear-gradient(135deg, #ffe4ec, #ffced8); }
        .product-card:nth-child(6) .product-image { background: linear-gradient(135deg, #f0e0e0, #e8d0d0); }

        /* 产品卡片内的花朵 */
        .card-flower {
            width: 120px;
            height: 120px;
            position: relative;
        }

        .card-flower .petal-layer {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .card-flower .petal {
            position: absolute;
            background: linear-gradient(135deg, #ff4757, #c0392b);
            border-radius: 50% 50% 50% 50%;
            animation: none;
            opacity: 1;
        }

        .card-flower .petal-large {
            width: 45px;
            height: 60px;
        }

        .card-flower .petal-large:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%) rotate(0deg); }
        .card-flower .petal-large:nth-child(2) { top: 15%; right: 5%; transform: rotate(45deg); }
        .card-flower .petal-large:nth-child(3) { top: 45%; right: 0; transform: rotate(90deg);
