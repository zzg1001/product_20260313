<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色玫瑰 - 绽放的美丽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a0a 100%);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .title {
            color: #ff6b6b;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            margin-bottom: 20px;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
            to { text-shadow: 0 0 40px rgba(255, 107, 107, 0.8), 0 0 60px rgba(255, 0, 0, 0.4); }
        }

        .flower-container {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flower {
            position: relative;
            width: 200px;
            height: 200px;
            animation: bloom 3s ease-in-out infinite;
        }

        @keyframes bloom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .petal {
            position: absolute;
            width: 80px;
            height: 100px;
            background: linear-gradient(145deg, #ff4757, #c0392b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 
                        inset 5px 5px 15px rgba(255,255,255,0.1),
                        0 10px 30px rgba(255, 71, 87, 0.3);
            left: 50%;
            bottom: 50%;
            margin-left: -40px;
        }

        .petal:nth-child(1) { transform: rotate(0deg) translateY(-20px); }
        .petal:nth-child(2) { transform: rotate(45deg) translateY(-20px); }
        .petal:nth-child(3) { transform: rotate(90deg) translateY(-20px); }
        .petal:nth-child(4) { transform: rotate(135deg) translateY(-20px); }
        .petal:nth-child(5) { transform: rotate(180deg) translateY(-20px); }
        .petal:nth-child(6) { transform: rotate(225deg) translateY(-20px); }
        .petal:nth-child(7) { transform: rotate(270deg) translateY(-20px); }
        .petal:nth-child(8) { transform: rotate(315deg) translateY(-20px); }

        .petal-inner {
            position: absolute;
            width: 50px;
            height: 70px;
            background: linear-gradient(145deg, #e74c3c, #a93226);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            box-shadow: inset -3px -3px 10px rgba(0,0,0,0.4);
            left: 50%;
            bottom: 50%;
            margin-left: -25px;
        }

        .petal-inner:nth-child(9) { transform: rotate(22.5deg) translateY(-10px); }
        .petal-inner:nth-child(10) { transform: rotate(67.5deg) translateY(-10px); }
        .petal-inner:nth-child(11) { transform: rotate(112.5deg) translateY(-10px); }
        .petal-inner:nth-child(12) { transform: rotate(157.5deg) translateY(-10px); }
        .petal-inner:nth-child(13) { transform: rotate(202.5deg) translateY(-10px); }
        .petal-inner:nth-child(14) { transform: rotate(247.5deg) translateY(-10px); }
        .petal-inner:nth-child(15) { transform: rotate(292.5deg) translateY(-10px); }
        .petal-inner:nth-child(16) { transform: rotate(337.5deg) translateY(-10px); }

        .center {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #f39c12 0%, #d35400 50%, #c0392b 100%);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            z-index: 10;
        }

        .stem {
            position: absolute;
            width: 12px;
            height: 180px;
            background: linear-gradient(90deg, #1e5631, #2d8659, #1e5631);
            bottom: -180px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .leaf {
            position: absolute;
            width: 60px;
            height: 30px;
            background: linear-gradient(145deg, #27ae60, #1e8449);
            border-radius: 0 70% 0 70%;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .leaf-left {
            bottom: -100px;
            left: 50%;
            transform: translateX(-100%) rotate(-30deg);
        }

        .leaf-right {
            bottom: -140px;
            left: 50%;
            transform: rotate(30deg);
            border-radius: 70% 0 70% 0;
        }

        .description {
            margin-top: 220px;
            text-align: center;
            color: #ffeaa7;
            max-width: 500px;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(255, 71, 87, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .description h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .description p {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #ff6b6b, transparent);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 16s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 13s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 15s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 11s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 17s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 12s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 14s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 3s; animation-duration: 16s; }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .falling-petal {
            position: absolute;
            width: 20px;
            height: 25px;
            background: linear-gradient(145deg, #ff4757, #c0392b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: fall 10s infinite linear;
            opacity: 0.7;
        }

        .falling-petal:nth-child(11) { left: 5%; animation-delay: 0s; }
        .falling-petal:nth-child(12) { left: 25%; animation-delay: 2s; }
        .falling-petal:nth-child(13) { left: 45%; animation-delay: 4s; }
        .falling-petal:nth-child(14) { left: 65%; animation-delay: 1s; }
        .falling-petal:nth-child(15) { left: 85%; animation-delay: 3s; }
        .falling-petal:nth-child(16) { left: 15%; animation-delay: 5s; }
        .falling-petal:nth-child(17) { left: 35%; animation-delay: 2.5s; }
        .falling-petal:nth-child(18) { left: 55%; animation-delay: 3.5s; }
        .falling-petal:nth-child(19) { left: 75%; animation-delay: 1.5s; }
        .falling-petal:nth-child(20) { left: 95%; animation-delay: 4.5s; }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(100px);
                opacity: 0;
            }
        }

        .quote {
            margin-top: 30px;
            font-style: italic;
            color: #fab1a0;
            font-size: 1.2rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.8rem;
            }
            .flower-container {
                transform: scale(0.8);
            }
            .description {
                margin-top: 180px;
                padding: 20px;
            }
            .description h2 {
                font-size: 1.4rem;
            }
            .description p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <div class="falling-petal"></div>
        <div class="falling-petal"></div>
        <div class="falling-petal"></div>
        <div class="falling-petal"></div>
        <div class="falling-petal"></div>
        <div class="falling-petal"></div>
