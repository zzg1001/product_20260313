<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色跑车展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #ff4444, #ff6b6b, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 68, 68, 0.5);
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.2rem;
        }

        .car-showcase {
            position: relative;
            margin: 40px auto;
            padding: 60px 20px;
            background: linear-gradient(180deg, rgba(255,68,68,0.1) 0%, transparent 100%);
            border-radius: 30px;
        }

        .car-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .car-svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 30px 60px rgba(255, 68, 68, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .glow-ring {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 40px;
            background: radial-gradient(ellipse, rgba(255,68,68,0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin: 60px 0;
        }

        .spec-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,68,68,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .spec-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255,68,68,0.8);
            box-shadow: 0 20px 40px rgba(255,68,68,0.3);
        }

        .spec-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .spec-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 5px;
        }

        .spec-label {
            color: #aaa;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .features {
            background: linear-gradient(145deg, rgba(255,68,68,0.15), rgba(255,68,68,0.05));
            border-radius: 30px;
            padding: 50px;
            margin: 40px 0;
        }

        .features h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 40px;
            color: #ff6b6b;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255,68,68,0.2);
            transform: translateX(10px);
        }

        .feature-item span:first-child {
            font-size: 1.5rem;
        }

        .cta-section {
            text-align: center;
            padding: 60px 20px;
        }

        .price-tag {
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
        }

        .price {
            font-size: 4rem;
            font-weight: bold;
            color: #ff4444;
            margin-bottom: 30px;
        }

        .price span {
            font-size: 1.5rem;
            color: #888;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 50px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255,68,68,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,68,68,0.6);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .btn-secondary:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .color-options {
            margin: 40px 0;
            text-align: center;
        }

        .color-options h3 {
            margin-bottom: 20px;
            color: #888;
        }

        .colors {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .color-dot.active {
            border-color: #fff;
            box-shadow: 0 0 20px currentColor;
        }

        .color-red { background: linear-gradient(135deg, #ff4444, #cc0000); }
        .color-black { background: linear-gradient(135deg, #333, #000); }
        .color-white { background: linear-gradient(135deg, #fff, #ddd); }
        .color-blue { background: linear-gradient(135deg, #4444ff, #0000cc); }
        .color-silver { background: linear-gradient(135deg, #c0c0c0, #808080); }

        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .spec-value {
                font-size: 2rem;
            }

            .price {
                font-size: 2.5rem;
            }

            .features {
                padding: 30px 20px;
            }

            .btn {
                padding: 15px 35px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏎️ 烈焰红 · 极速之魂</h1>
            <p>感受速度与激情的完美融合</p>
        </header>

                    <defs>

                            <stop offset="0%" style="stop-color:#ff6666"/>

                            <stop offset="100%" style="stop-color:#990000"/>
                        </linearGradient>
                        <linearGradient id="carBodyTop" x1="0%" y1="0%" x2="0%" y2="100%">

                        <linearGradient id="window" x1="0%" y1="0%" x2="0%" y2="100%">

                        </linearGradient>

                            <stop offset="100%" style="stop-color:#ccc"/>
                        </linearGradient>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
                        </filter>
                    </defs>

                             Q740 190 720 190
                             L650 195

                             L610 180
                             L250 180
                             Q240 180 240 190
                             L240 195
                             L180 195
                             L100 190
                             Q90 190 100 180Z" 
                          fill="url(#carBody)" filter="url(#shadow)"/>
                    
                    <!-- Car Roof -->
                    <path d="M280 130

                             L560 115
                             Q570 125 560 130
                             L540 140
                             L300 140

                    <!-- Windows -->
                    <path d="M295 128

                             L380 90
                             L385 125
                             L295 128Z" 
                          fill="url(#window)" opacity="0.9"/>
                    
                    <path d="M395 90
                             L440 88
                             Q480 90 510 105
                             L535 125
                             L395 125
                             Z" 
                          fill="url(#window)" opacity="0.9"/>
                    
                    <!-- Front Details -->
                    <path d="M60 155 L150 145 L150 155 L70 162 Z" fill="#222"/>
                    <rect x="65" y="152" width="30" height="8" rx="2" fill="#ffcc00" opacity="0.9"/>
                    <rect x="100" y="150" width="40" height="6" rx="2" fill="#ff4444" opacity="0.8"/>
                    
                    <!-- Rear Details -->
                    <path d="M720 165 L740 175 L740 180 L710 180 Z" fill="#222"/>
                    <rect x="700" y="168" width="25" height="8" rx="2" fill="#ff0000"/>
                    
                    <!-- Side Line Details -->
                    <path d="M150 160 L650 160" stroke="#ff8888" stroke-width="2" opacity="0.6"/>
                    <path d="M200 175 L600 175" stroke="#880000" stroke-width="1" opacity="0.5"/>
                    
                    <!-- Door Line -->
                    <path d="M400 130 L400 180" stroke="#880000" stroke-width="1"/>
                    
                    <!-- Side Mirror -->
                    <ellipse cx
