<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栀子花 - 纯白的芬芳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', '宋体', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f4e5 50%, #fff9e6 100%);
            min-height: 100vh;
            color: #2d3436;
            line-height: 1.8;
        }

        /* 头部导航 */
        header {
            background: linear-gradient(90deg, rgba(255,255,255,0.95), rgba(248,252,248,0.95));
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(107, 142, 35, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #4a7c3f;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #fff 0%, #f0f9e8 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(107, 142, 35, 0.2);
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #5a7052;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: #4a7c3f;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #4a7c3f, #8bc34a);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 英雄区域 */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 80px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            top: 10%;
            right: -10%;
            animation: float 8s ease-in-out infinite;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(248,252,230,0.6) 0%, transparent 70%);
            bottom: 10%;
            left: -5%;
            animation: float 6s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .hero-content {
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-size: 72px;
            color: #3d5c35;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        .hero-text h1 span {
            display: block;
            font-size: 24px;
            color: #6b8e5a;
            font-weight: normal;
            font-style: italic;
            margin-top: 10px;
        }

        .hero-text p {
            font-size: 20px;
            color: #5a7052;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .hero-btn {
            display: inline-block;
            padding: 18px 45px;
            background: linear-gradient(135deg, #4a7c3f 0%, #6b9b5a 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(74, 124, 63, 0.3);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(74, 124, 63, 0.4);
        }

        .hero-image {
            position: relative;
        }

        .flower-display {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(248,252,248,0.8) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(74, 124, 63, 0.2),
                        inset 0 0 60px rgba(255,255,255,0.5);
            position: relative;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .flower-emoji {
            font-size: 180px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .floating-petal {
            position: absolute;
            font-size: 30px;
            animation: floatPetal 5s ease-in-out infinite;
        }

        .floating-petal:nth-child(2) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-petal:nth-child(3) { top: 20%; right: 5%; animation-delay: 1s; }
        .floating-petal:nth-child(4) { bottom: 15%; left: 5%; animation-delay: 2s; }
        .floating-petal:nth-child(5) { bottom: 25%; right: 15%; animation-delay: 1.5s; }

        @keyframes floatPetal {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        /* 特色区域 */
        .features {
            padding: 100px 5%;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.5), transparent);
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-size: 42px;
            color: #3d5c35;
            margin-bottom: 15px;
        }

        .section-title p {
            font-size: 18px;
            color: #6b8e5a;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(248,252,248,0.9) 100%);
            padding: 50px 35px;
            border-radius: 25px;
            text-align: center;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(74, 124, 63, 0.1);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(74, 124, 63, 0.2);
        }

        .feature-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f8fcf5 0%, #e8f4e5 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 40px;
            box-shadow: 0 8px 25px rgba(74, 124, 63, 0.15);
        }

        .feature-card h3 {
            font-size: 24px;
            color: #3d5c35;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #6b8e5a;
            font-size: 16px;
        }

        /* 诗词区域 */
        .poetry {
            padding: 100px 5%;
            background: linear-gradient(135deg, rgba(61, 92, 53, 0.05) 0%, rgba(139, 195, 74, 0.05) 100%);
        }

        .poetry-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .poem-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(252,254,250,0.95) 100%);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(74, 124, 63, 0.15);
            position: relative;
            overflow: hidden;
        }

        .poem-card::before {
            content: '"';
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 120px;
            color: rgba(74, 124, 63, 0.1);
            font-family: Georgia, serif;
            line-height: 1;
        }

        .poem-text {
            font-size: 26px;
            color: #3d5c35;
            line-height: 2;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .poem-author {
            font-size: 18px;
            color: #6b8e5a;
            font-style: italic;
        }

        /* 图片展示 */
        .gallery {
            padding: 100px 5%;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            height: 280px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(248,252,248,0.8) 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(74, 124, 63, 0.1);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(74, 124, 63, 0.2);
        }

        .gallery-item:nth-child(1) { grid-row: span 2; height: auto; }

        .gallery-item span {
            font-size: 60px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover span {
            transform: scale(1.2);
        }

        .gallery-item p {
            font-size: 16px;
            color: #4a7c3f;
            font-weight: 500;
        }

        /* 花语含义 */
        .meaning {
            padding: 100px 5%;
            background: linear-gradient(135deg, #f8fcf5 0%, #fff 50%, #fffef5 100%);
        }

        .meaning-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .meaning-text h3 {
            font-size: 36px;
            color: #3d5c35;
            margin-bottom: 25px;
        }

        .meaning-text p {
            font-size: 18px;
            color: #5a7052;
            margin-bottom: 20px;
        }

        .meaning-list {
            list-style: none;
            margin-top: 30px;
        }

        .meaning-list li {
            padding: 15px 0;
            border-bottom: 1px solid rgba(74, 124, 63, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 17px;
            color: #4a7c3f;
        }

        .meaning-list li span {
            font-size: 24px;
        }

        .meaning-visual {
            display: flex;
            justify-content: center;
        }

            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(255,
