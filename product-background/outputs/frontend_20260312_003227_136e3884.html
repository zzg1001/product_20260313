<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玫瑰花园 - 浪漫玫瑰专卖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f5 50%, #fff0f3 100%);
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* 导航栏 */
        header {
            background: linear-gradient(135deg, #c41e3a 0%, #e91e63 50%, #f06292 100%);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .logo span {
            font-size: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .cart-btn {
            background: white;
            color: #c41e3a;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* 英雄区域 */
        .hero {
            margin-top: 70px;
            padding: 6rem 2rem;
            background: linear-gradient(135deg, rgba(196, 30, 58, 0.9) 0%, rgba(233, 30, 99, 0.85) 100%), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="rgba(255,255,255,0.1)"/></svg>');
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '🌹';
            position: absolute;
            font-size: 15rem;
            opacity: 0.1;
            top: -2rem;
            right: -2rem;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        .hero-btn {
            background: white;
            color: #c41e3a;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        /* 特色区域 */
        .features {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(196, 30, 58, 0.1);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(196, 30, 58, 0.2);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            color: #c41e3a;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        /* 产品展示 */
        .products {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #c41e3a;
            margin-bottom: 3rem;
            position: relative;
        }

        .section-title::after {
            content: '🌹';
            display: block;
            font-size: 2rem;
            margin-top: 0.5rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(196, 30, 58, 0.15);
            transition: all 0.4s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 70px rgba(196, 30, 58, 0.25);
        }

        .product-image {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            position: relative;
            overflow: hidden;
        }

        .product-card:nth-child(1) .product-image {
            background: linear-gradient(135deg, #ffccd5 0%, #ffb3c1 100%);
        }

        .product-card:nth-child(2) .product-image {
            background: linear-gradient(135deg, #fff0f3 0%, #ffc2d1 100%);
        }

        .product-card:nth-child(3) .product-image {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
        }

        .product-card:nth-child(4) .product-image {
            background: linear-gradient(135deg, #ffd6e0 0%, #ff99ac 100%);
        }

        .product-card:nth-child(5) .product-image {
            background: linear-gradient(135deg, #ffebef 0%, #ffc8d7 100%);
        }

        .product-card:nth-child(6) .product-image {
            background: linear-gradient(135deg, #ffe0e9 0%, #ffadc6 100%);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #c41e3a, #e91e63);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .product-desc {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.5rem;
            color: #c41e3a;
            font-weight: bold;
        }

        .product-price span {
            font-size: 0.9rem;
            color: #aaa;
            text-decoration: line-through;
            margin-left: 0.5rem;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #c41e3a 0%, #e91e63 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(196, 30, 58, 0.4);
        }

        /* 玫瑰花语 */
        .rose-meaning {
            padding: 5rem 2rem;
            background: linear-gradient(135deg, #c41e3a 0%, #e91e63 50%, #f06292 100%);
            color: white;
            text-align: center;
        }

        .rose-meaning h2 {
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .meaning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .meaning-card {
            background: rgba(255,255,255,0.15);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .meaning-card:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .meaning-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .meaning-card h4 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .meaning-card p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        /* 客户评价 */
        .testimonials {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(196, 30, 58, 0.1);
            position: relative;
        }

        .testimonial-card::before {
            content: '"';
            font-size: 5rem;
            color: #ffccd5;
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: Georgia, serif;
            line-height: 1;
        }

        .testimonial-text {
            font-style: italic;
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.8;
            padding-top: 2rem;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ffccd5, #ff99ac);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .author-info h5 {
            color: #333;
            margin-bottom: 0.2rem;
        }

        .author-info span {
            color: #f06292;
            font-size: 0.9rem;
        }

        /* 页脚 */
        footer {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            color: white;
            padding: 4rem 2rem 2rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
        }

        .footer-section h4 {
            color: #f06292;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 0.8rem;
        }

        .footer-section a {
            color: #ccc;
            text-decoration
