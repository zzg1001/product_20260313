<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醇香酒庄 - 品味生活的艺术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1f1f 50%, #1a0a0a 100%);
            min-height: 100vh;
            color: #f5f5f5;
        }

        /* 顶部导航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37, #f5d77a, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #d4af37;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #d4af37, #f5d77a);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-btn {
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.6);
        }

        .cart-count {
            background: #d4af37;
            color: #1a0a0a;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* 英雄区域 */
        .hero {
            margin-top: 70px;
            height: 80vh;
            background: linear-gradient(rgba(26, 10, 10, 0.7), rgba(26, 10, 10, 0.8)),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="rgba(212,175,55,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(139, 0, 0, 0.2) 0%, transparent 70%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 56px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #d4af37, #f5d77a, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        .hero p {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .hero-btn {
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.4);
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 0, 0, 0.6);
        }

        /* 分类导航 */
        .categories {
            padding: 80px 5%;
            background: linear-gradient(180deg, #1a0a0a, #2d1f1f);
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 36px;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .section-title p {
            color: #999;
            font-size: 16px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-card {
            background: linear-gradient(145deg, #2d1f1f, #3d2a2a);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .category-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .category-card h3 {
            color: #f5f5f5;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .category-card p {
            color: #888;
            font-size: 14px;
        }

        /* 精选商品 */
        .products {
            padding: 80px 5%;
            background: linear-gradient(180deg, #2d1f1f, #1a0a0a);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: linear-gradient(145deg, #2a1a1a, #3a2525);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }

        .product-image {
            height: 250px;
            background: linear-gradient(180deg, #3d2a2a, #2d1f1f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            overflow: hidden;
        }

        .product-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(transparent, rgba(26, 10, 10, 0.8));
        }

        .product-info {
            padding: 25px;
        }

        .product-name {
            font-size: 18px;
            color: #f5f5f5;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .product-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .product-rating {
            color: #d4af37;
            font-size: 14px;
        }

        .product-reviews {
            color: #666;
            font-size: 13px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 24px;
            color: #d4af37;
            font-weight: bold;
        }

        .product-price span {
            font-size: 14px;
            color: #888;
            text-decoration: line-through;
            margin-left: 10px;
        }

        .add-cart-btn {
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-cart-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.5);
        }

        /* 特色区域 */
        .features {
            padding: 80px 5%;
            background: linear-gradient(180deg, #1a0a0a, #2d1f1f);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            text-align: center;
            padding: 40px 20px;
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #8b0000, #a52a2a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 10px 30px rgba(139, 0, 0, 0.3);
        }

        .feature-card h3 {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .feature-card p {
            color: #888;
            font-size: 14px;
            line-height: 1.8;
        }

        /* 品牌故事 */
        .story {
            padding: 100px 5%;
            background: linear-gradient(135deg, #2d1f1f, #1a0a0a);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .story-image {
            flex: 1;
            height: 500px;
            background: linear-gradient(145deg, #3a2525, #2a1a1a);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 150px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .story-content {
            flex: 1;
        }

        .story-content h2 {
            font-size: 42px;
            color: #d4af37;
            margin-bottom: 25px;
        }

        .story-content p {
            color: #aaa;
            font-size: 16px;
            line-height: 2;
            margin-bottom: 30px;
        }

        .story-btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .story-btn
