<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 数据分析图表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #e8ebf5 0%, #d8dcf0 100%);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-area h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .upload-area p {
            color: #666;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .charts-section {
            display: none;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* 柱状图样式 */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 250px;
            padding: 20px 0;
            border-bottom: 2px solid #e0e0e0;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 60px;
        }

        .bar {
            width: 40px;
            border-radius: 8px 8px 0 0;
            transition: all 0.5s ease;
            position: relative;
        }

        .bar:hover {
            transform: scaleY(1.05);
            filter: brightness(1.1);
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
        }

        .bar-label {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }

        /* 饼图样式 */
        .pie-chart-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .pie-chart {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            position: relative;
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        /* 折线图样式 */
        .line-chart {
            position: relative;
            height: 250px;
            padding: 20px;
        }

        .line-chart svg {
            width: 100%;
            height: 100%;
        }

        /* 数据表格样式 */
        .data-table-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .data-table tr:hover {
            background: #f8f9ff;
        }

        .data-table tr:nth-child(even) {
            background: #fafafa;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        /* 导出按钮区域 */
        .export-section {
            text-align: center;
            padding: 30px;
        }

        .export-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            margin: 0 10px;
        }

        .export-btn:hover {
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }

        /* 雷达图 */
        .radar-chart {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 280px;
        }

        /* 进度条图表 */
        .progress-chart {
            padding: 20px 0;
        }

        .progress-item {
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-label {
            font-weight: 500;
            color: #333;
        }

        .progress-value {
            color: #667eea;
            font-weight: bold;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .upload-area {
                padding: 40px 20px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            .pie-chart-container {
                flex-direction: column;
            }
        }

        .file-name {
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📊 Excel 数据分析可视化</h1>
            <p>上传您的 Excel 文件，自动生成精美的分析图表</p>
        </header>

        <section class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <h3>点击或拖拽上传 Excel 文件</h3>
                <p>支持 .xlsx, .xls, .csv 格式</p>
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv">
                <div class="file-name" id="fileName"></div>
            </div>
            <div style="text-align: center;">
                <button class="btn" id="analyzeBtn" onclick="analyzeData()" disabled>🔍 开始分析</button>
                <button class="btn" onclick="loadSampleData()" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">📋 加载示例数据</button>
            </div>
        </section>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在分析数据，请稍候...</p>
        </div>

        <section class="charts-section" id="chartsSection">
            <!-- 统计概览 -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">数据总量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="statAvg">0</div>
                    <div class="stat-label">平均值</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔺</div>
                    <div class="stat-value" id="statMax">0</div>
                    <div class="stat-label">最大值</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔻</div>
                    <div class="stat-value" id="statMin">0</div>
                    <div class="stat-label">最小值</div>
                </div>
            </div>

            <!-- 图表网格 -->
            <div class="charts-grid">
                <!-- 柱状图 -->
                <div class="chart-card">
                    <h3>📊 销售额柱状图</h3>
                    <div class="bar-chart" id="barChart"></div>
                </div>

                <!-- 饼图 -->
                <div class="chart-card">
                    <h3>🥧 数据分布占比</h3>
                    <div class="pie-chart-container">
                        <div class="pie-chart" id="pieChart"></div>
                        <div class="pie-legend" id="pieLegend"></div>
                    </div>
                </div>

                <!-- 折线图 -->
                <div class="chart-card">
                    <h3>📈 趋势分析</h3>
                    <div
