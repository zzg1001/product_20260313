version: '3.8'

# 开发环境配置 - 仅启动数据库
# 使用: docker-compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: product_background
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./portal/server/schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql-dev-data:
